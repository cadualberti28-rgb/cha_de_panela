<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chá de Panela - Carlos e Gabi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .modal-overlay { background-color: rgba(28, 25, 23, 0.85); backdrop-filter: blur(8px); }
        .presente-card { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .presente-card:hover { transform: translateY(-8px); }
    </style>
</head>
<body class="bg-[#faf7f2] text-stone-800 pb-32">

    <div id="root">
        <div class="min-h-screen flex items-center justify-center">
            <div class="flex flex-col items-center gap-4">
                <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-rose-500"></div>
                <p class="text-stone-400 animate-pulse">Carregando o site...</p>
            </div>
        </div>
    </div>

    <script type="module">
        import React, { useState, useEffect } from 'https://esm.sh/react@18.2.0';
        import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getFirestore, collection, onSnapshot, addDoc, deleteDoc, updateDoc, doc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
        import { 
            Heart, Gift, Copy, CheckCircle2, QrCode, X, Landmark, User, Loader2, Plus, Trash2, Lock, Unlock, Pencil 
        } from 'https://esm.sh/lucide-react@0.263.0';

        // Configurações do Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyBAbGiEArsEz2EnzTxt-8vngYtWtr6qYyU",
            authDomain: "cha-de-panela-f4d73.firebaseapp.com",
            projectId: "cha-de-panela-f4d73",
            storageBucket: "cha-de-panela-f4d73.firebasestorage.app",
            messagingSenderId: "798143128950",
            appId: "1:798143128950:web:c6a615da5aa7716fffc657"
        };

        const idApp = 'cha-carlos-gabi-v3';
        
        // Dados do PIX ATUALIZADOS
        const PIX_CHAVE = "11789243947"; // CPF limpo para o Payload do QR Code
        const PIX_NOME = "GABRIELA LETICIA KASTCHUK DE DEUS";
        const PIX_NOME_CURTO = "Gabi";
        const PIX_CIDADE = "SAO PAULO"; 
        const PIX_BANCO = "NU PAGAMENTOS S.A. (NUBANK)";

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        function App() {
            const [itens, setItens] = useState([]);
            const [usuario, setUsuario] = useState(null);
            const [carregando, setCarregando] = useState(true);
            const [itemSelecionado, setItemSelecionado] = useState(null);
            const [itemEditando, setItemEditando] = useState(null);
            const [copiado, setCopiado] = useState(false);
            
            // Estado Admin
            const [eAdmin, setEAdmin] = useState(false);
            const [mostrarModalLogin, setMostrarModalLogin] = useState(false);
            const [dadosLogin, setDadosLogin] = useState({ usuario: '', senha: '' });
            const [erroLogin, setErroLogin] = useState('');
            
            // Estado do Formulário (Adicionar/Editar)
            const [formulario, setFormulario] = useState({ nome: '', preco: '', urlImagem: '' });

            const gerarPayloadPix = (valor) => {
                const valorFormatado = Number(valor).toFixed(2);
                const f = (id, val) => {
                    const len = val.length.toString().padStart(2, '0');
                    return `${id}${len}${val}`;
                };
                const gui = "0014BR.GOV.BCB.PIX";
                const chave = f("01", PIX_CHAVE);
                const contaMercante = f("26", gui + chave);
                let payload = "000201" + contaMercante + "520400005303986" + f("54", valorFormatado) + "5802BR" + f("59", PIX_NOME_CURTO.toUpperCase()) + f("60", PIX_CIDADE.toUpperCase()) + "62070503***6304";
                
                let crc = 0xFFFF;
                for (let i = 0; i < payload.length; i++) {
                    crc ^= payload.charCodeAt(i) << 8;
                    for (let j = 0; j < 8; j++) {
                        if ((crc & 0x8000) !== 0) crc = (crc << 1) ^ 0x1021;
                        else crc <<= 1;
                    }
                }
                crc = (crc & 0xFFFF).toString(16).toUpperCase().padStart(4, '0');
                return payload + crc;
            };

            useEffect(() => {
                const initAuth = async () => {
                    await signInAnonymously(auth);
                };
                initAuth();
                const desinscreverAuth = onAuthStateChanged(auth, setUsuario);
                return () => desinscreverAuth();
            }, []);

            useEffect(() => {
                if (!usuario) return;
                const refColecao = collection(db, 'artifacts', idApp, 'public', 'data', 'presentes');
                const desinscrever = onSnapshot(refColecao, (snap) => {
                    const dados = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    setItens(dados.sort((a, b) => (b.criadoEm || 0) - (a.criadoEm || 0)));
                    setCarregando(false);
                }, (error) => {
                    console.error("Erro ao buscar dados:", error);
                });
                return () => desinscrever();
            }, [usuario]);

            const realizarLogin = (e) => {
                e.preventDefault();
                if (dadosLogin.usuario === 'carlos_adm' && dadosLogin.senha === 'carlos_adm') {
                    setEAdmin(true);
                    setMostrarModalLogin(false);
                    setErroLogin('');
                } else {
                    setErroLogin('Credenciais incorretas.');
                }
            };

            const salvarItem = async (e) => {
                e.preventDefault();
                if (!formulario.nome || !formulario.preco || !usuario) return;

                const dados = {
                    name: formulario.nome,
                    price: parseFloat(String(formulario.preco).replace(',', '.')),
                    imageUrl: formulario.urlImagem || 'https://images.unsplash.com/photo-1556911220-e15b29be8c8f?q=80&w=400',
                    updatedAt: Date.now()
                };

                try {
                    if (itemEditando) {
                        await updateDoc(doc(db, 'artifacts', idApp, 'public', 'data', 'presentes', itemEditando.id), dados);
                        setItemEditando(null);
                    } else {
                        await addDoc(collection(db, 'artifacts', idApp, 'public', 'data', 'presentes'), { ...dados, criadoEm: Date.now() });
                    }
                    setFormulario({ nome: '', preco: '', urlImagem: '' });
                } catch (err) {
                    console.error(err);
                }
            };

            const iniciarEdicao = (item) => {
                setItemEditando(item);
                setFormulario({ nome: item.name, preco: item.price, urlImagem: item.imageUrl });
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const deletarItem = async (id) => {
                if (!usuario) return;
                await deleteDoc(doc(db, 'artifacts', idApp, 'public', 'data', 'presentes', id));
            };

            const copiarParaTransferencia = (texto) => {
                const el = document.createElement('textarea');
                el.value = texto;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                setCopiado(true);
                setTimeout(() => setCopiado(false), 2000);
            };

            if (carregando) return React.createElement('div', { className: "min-h-screen flex items-center justify-center bg-[#faf7f2]" }, React.createElement(Loader2, { className: "animate-spin text-rose-500 w-12 h-12" }));

            return React.createElement('div', { className: "min-h-screen" }, [
                // Cabeçalho (Header)
                React.createElement('header', { key: 'header', className: "bg-white pt-20 pb-16 px-4 text-center shadow-sm relative overflow-hidden" }, [
                    React.createElement('div', { key: 'bar', className: "absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-rose-200 via-rose-400 to-rose-200" }),
                    React.createElement(Heart, { className: "w-10 h-10 text-rose-400 mx-auto mb-4 fill-rose-50" }),
                    React.createElement('h1', { className: "text-5xl md:text-7xl font-serif mb-1 tracking-tight text-stone-800" }, "Carlos e Gabi"),
                    React.createElement('p', { className: "text-stone-400 text-lg max-w-2xl mx-auto mb-2 tracking-wide uppercase text-sm font-medium" }, "Celebrando o nosso novo capítulo com quem mais amamos")
                ]),

                // Painel do Administrador
                eAdmin && React.createElement('section', { key: 'admin-panel', className: "max-w-4xl mx-auto px-6 mt-12" }, 
                    React.createElement('div', { className: `p-8 rounded-[2.5rem] shadow-xl border-2 ${itemEditando ? 'border-amber-200 bg-amber-50/20' : 'border-white bg-white'}` }, [
                        React.createElement('div', { className: "flex items-center gap-2 mb-6" }, [
                            itemEditando ? React.createElement(Pencil, { className: "text-amber-500" }) : React.createElement(Plus, { className: "text-rose-500" }),
                            React.createElement('h2', { className: "text-xl font-bold" }, itemEditando ? `Editando: ${itemEditando.name}` : "Adicionar Novo Presente")
                        ]),
                        React.createElement('form', { onSubmit: salvarItem, className: "grid grid-cols-1 md:grid-cols-3 gap-4" }, [
                            React.createElement('div', null, [
                                React.createElement('label', { className: "text-[10px] font-bold text-stone-400 uppercase ml-2" }, "Nome"),
                                React.createElement('input', { value: formulario.nome, onChange: e => setFormulario({...formulario, nome: e.target.value}), className: "w-full p-4 rounded-2xl bg-stone-50 border border-stone-100 outline-none focus:ring-2 ring-rose-200" })
                            ]),
                            React.createElement('div', null, [
                                React.createElement('label', { className: "text-[10px] font-bold text-stone-400 uppercase ml-2" }, "Preço (R$)"),
                                React.createElement('input', { type: "number", step: "0.01", value: formulario.preco, onChange: e => setFormulario({...formulario, preco: e.target.value}), className: "w-full p-4 rounded-2xl bg-stone-50 border border-stone-100 outline-none focus:ring-2 ring-rose-200" })
                            ]),
                            React.createElement('div', null, [
                                React.createElement('label', { className: "text-[10px] font-bold text-stone-400 uppercase ml-2" }, "URL da Imagem"),
                                React.createElement('input', { value: formulario.urlImagem, onChange: e => setFormulario({...formulario, urlImagem: e.target.value}), className: "w-full p-4 rounded-2xl bg-stone-50 border border-stone-100 outline-none focus:ring-2 ring-rose-200" })
                            ]),
                            React.createElement('div', { className: "md:col-span-3 flex gap-2" }, [
                                React.createElement('button', { type: "submit", className: `flex-1 py-4 rounded-2xl font-bold text-white shadow-lg transition-all ${itemEditando ? 'bg-amber-500 hover:bg-amber-600' : 'bg-rose-500 hover:bg-rose-600'}` }, 
                                    itemEditando ? "Atualizar Presente" : "Salvar na Lista"
                                ),
                                itemEditando && React.createElement('button', { type: "button", onClick: () => { setItemEditando(null); setFormulario({nome:'', preco:'', urlImagem:''}); }, className: "px-6 bg-stone-200 text-stone-600 rounded-2xl font-bold hover:bg-stone-300" }, React.createElement(X))
                            ])
                        ])
                    ])
                ),

                // Lista de Presentes
                React.createElement('main', { key: 'main', className: "max-w-7xl mx-auto px-6 py-16" }, 
                    React.createElement('div', { className: "grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-10" }, 
                        itens.map(item => React.createElement('div', { key: item.id, className: "presente-card bg-white rounded-[2.5rem] overflow-hidden shadow-md flex flex-col group border border-white relative" }, [
                            eAdmin && React.createElement('div', { className: "absolute top-4 right-4 flex gap-2 z-20" }, [
                                React.createElement('button', { onClick: () => iniciarEdicao(item), className: "bg-white/90 p-2 rounded-full shadow-lg text-amber-500 hover:bg-amber-500 hover:text-white transition-all" }, React.createElement(Pencil, { size: 18 })),
                                React.createElement('button', { onClick: () => deletarItem(item.id), className: "bg-white/90 p-2 rounded-full shadow-lg text-rose-500 hover:bg-rose-500 hover:text-white transition-all" }, React.createElement(Trash2, { size: 18 }))
                            ]),
                            
                            React.createElement('div', { className: "h-72 overflow-hidden" }, 
                                React.createElement('img', { src: item.imageUrl, className: "h-full w-full object-cover transition-transform duration-700 group-hover:scale-110", alt: item.name })
                            ),
                            React.createElement('div', { className: "p-8 text-center flex-1 flex flex-col justify-between" }, [
                                React.createElement('div', null, [
                                    React.createElement('h3', { className: "text-xl font-bold mb-3 text-stone-700 font-serif" }, item.name),
                                    React.createElement('p', { className: "text-rose-500 font-black text-2xl mb-8" }, `R$ ${item.price.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`)
                                ]),
                                React.createElement('button', { 
                                    onClick: () => setItemSelecionado(item),
                                    className: "w-full py-4 bg-stone-800 text-white rounded-2xl font-bold hover:bg-rose-500 transition-all flex items-center justify-center gap-2 shadow-lg"
                                }, [React.createElement(Gift, { size: 18 }), "Presentear"])
                            ])
                        ]))
                    )
                ),

                // Modal Login
                mostrarModalLogin && React.createElement('div', { className: "fixed inset-0 modal-overlay flex items-center justify-center p-4 z-[200]" }, 
                    React.createElement('div', { className: "bg-white rounded-[3rem] p-10 max-w-sm w-full relative shadow-2xl text-center" }, [
                        React.createElement('button', { onClick: () => setMostrarModalLogin(false), className: "absolute top-8 right-8 text-stone-300 hover:text-stone-600" }, React.createElement(X)),
                        React.createElement(Lock, { className: "mx-auto text-rose-400 mb-4", size: 40 }),
                        React.createElement('h2', { className: "text-2xl font-bold mb-8" }, "Área Restrita"),
                        React.createElement('form', { onSubmit: realizarLogin, className: "space-y-4" }, [
                            React.createElement('input', { placeholder: "Usuário", value: dadosLogin.usuario, onChange: e => setDadosLogin({...dadosLogin, usuario: e.target.value}), className: "w-full p-4 rounded-2xl bg-stone-50 border border-stone-100 outline-none" }),
                            React.createElement('input', { type: "password", placeholder: "Senha", value: dadosLogin.senha, onChange: e => setDadosLogin({...dadosLogin, senha: e.target.value}), className: "w-full p-4 rounded-2xl bg-stone-50 border border-stone-100 outline-none" }),
                            erroLogin && React.createElement('p', { className: "text-rose-500 text-xs" }, erroLogin),
                            React.createElement('button', { type: "submit", className: "w-full py-4 bg-stone-800 text-white rounded-2xl font-bold hover:bg-black transition-all" }, "Entrar")
                        ])
                    ])
                ),

                // Modal Pagamento (PIX)
                itemSelecionado && React.createElement('div', { className: "fixed inset-0 modal-overlay flex items-center justify-center p-4 z-[100]" }, 
                    React.createElement('div', { className: "bg-white rounded-[3.5rem] p-8 md:p-14 max-w-md w-full relative text-center shadow-2xl" }, [
                        React.createElement('button', { onClick: () => setItemSelecionado(null), className: "absolute top-8 right-8 text-stone-300 hover:text-stone-600" }, React.createElement(X, { size: 32 })),
                        React.createElement('h3', { className: "text-2xl font-serif font-bold mb-1" }, itemSelecionado.name),
                        React.createElement('p', { className: "text-rose-500 font-black text-2xl mb-8" }, `R$ ${itemSelecionado.price.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`),
                        
                        React.createElement('div', { className: "bg-stone-50 p-6 rounded-[2.5rem] border border-stone-100 mb-8" }, [
                            React.createElement('div', { className: "bg-white p-4 inline-block rounded-[2rem] mb-6 shadow-sm border border-stone-100" }, 
                                React.createElement('img', { 
                                    src: `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(gerarPayloadPix(itemSelecionado.price))}`, 
                                    className: "w-48 h-48", alt: "QR Code PIX" 
                                })
                            ),
                            React.createElement('div', { className: "text-left bg-white rounded-2xl p-5 mb-6 border border-stone-100 space-y-3" }, [
                                React.createElement('div', { className: "flex items-start gap-3" }, [
                                    React.createElement(User, { size: 16, className: "text-rose-400 mt-1" }),
                                    React.createElement('div', null, [
                                        React.createElement('p', { className: "text-[10px] text-stone-400 uppercase font-bold" }, "Favorecido"),
                                        React.createElement('p', { className: "text-sm font-bold text-stone-700" }, PIX_NOME)
                                    ])
                                ]),
                                React.createElement('div', { className: "flex items-start gap-3 border-t border-stone-50 pt-3" }, [
                                    React.createElement(Landmark, { size: 16, className: "text-rose-400 mt-1" }),
                                    React.createElement('div', null, [
                                        React.createElement('p', { className: "text-[10px] text-stone-400 uppercase font-bold" }, "Banco"),
                                        React.createElement('p', { className: "text-sm font-bold text-stone-700" }, PIX_BANCO)
                                    ])
                                ])
                            ]),
                            React.createElement('button', { 
                                onClick: () => copiarParaTransferencia(gerarPayloadPix(itemSelecionado.price)),
                                className: `w-full py-5 rounded-2xl font-black transition-all flex items-center justify-center gap-3 ${copiado ? 'bg-green-500 text-white' : 'bg-stone-800 text-white hover:bg-black'}`
                            }, copiado ? [React.createElement(CheckCircle2, { size: 22 }), "Código Copiado!"] : [React.createElement(Copy, { size: 20 }), "Copiar Código PIX"])
                        ])
                    ])
                ),

                // Rodapé (Footer)
                React.createElement('footer', { key: 'footer', className: "bg-white py-12 text-center text-stone-400 text-sm border-t border-stone-50 relative" }, [
                    React.createElement('p', { className: "mb-6" }, "Carlos & Gabi"),
                    React.createElement('button', { 
                        onClick: () => eAdmin ? setEAdmin(false) : setMostrarModalLogin(true),
                        className: "inline-flex items-center gap-2 px-4 py-2 rounded-full bg-stone-50 text-stone-300 hover:text-rose-400 transition-all text-[10px] font-bold uppercase"
                    }, eAdmin ? [React.createElement(Unlock, { size: 12 }), "Sair do Painel"] : [React.createElement(Lock, { size: 12 }), "Painel Admin"])
                ])
            ]);
        }

        createRoot(document.getElementById('root')).render(React.createElement(App));
    </script>
</body>
</html>
